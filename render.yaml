services:
  - type: web
    name: urbis-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health/live
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PORT
        value: "8000"
      - key: MONGODB_DB
        value: urbis
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAMESITE
        value: none
      - key: DEMO_EMAIL_REDIRECT
        value: "false"
      - key: VISION_ENABLED
        value: "true"
      - key: RATE_LIMIT_ENABLED
        value: "true"
      # --- Set in Render dashboard (sync: false) ---
      - key: MONGODB_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: API_BASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: LEMMA_REFRESH_TOKEN
        sync: false
      - key: LEMMA_TOKEN
        sync: false
      - key: LEMMA_POD_ID
        sync: false
      - key: LEMMA_ORG_ID
        sync: false
      - key: LEMMA_BASE_URL
        value: https://api.lemma.work
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
