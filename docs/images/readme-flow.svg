<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 140" role="img" aria-label="Urbis complaint flow">
  <rect width="1100" height="140" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- step 1 camera -->
  <g transform="translate(40, 42)">
    <rect width="88" height="88" rx="18" fill="#ecfeff" stroke="#bae6fd"/>
    <g transform="translate(28, 26)" stroke="#0c4a6e" stroke-width="1.8" fill="none" stroke-linecap="round">
      <path d="M4 8h6l2-4h8l2 4h6v12H4z"/><circle cx="14" cy="14" r="4"/>
    </g>
    <text x="44" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#0c4a6e">Report</text>
  </g>

  <!-- step 2 AI -->
  <g transform="translate(248, 42)">
    <rect width="88" height="88" rx="18" fill="#fff7ed" stroke="#fed7aa"/>
    <g transform="translate(28, 24)" stroke="#c2410c" stroke-width="1.8" fill="none" stroke-linecap="round">
      <path d="M14 4c-4 4-6 8-6 12a6 6 0 1012 0c0-4-2-8-6-12z"/><path d="M10 18h8"/>
    </g>
    <text x="44" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#9a3412">Lemma AI</text>
  </g>

  <!-- step 3 approve -->
  <g transform="translate(456, 42)">
    <rect width="88" height="88" rx="18" fill="#f0fdf4" stroke="#bbf7d0"/>
    <g transform="translate(26, 24)" stroke="#15803d" stroke-width="1.8" fill="none" stroke-linecap="round">
      <rect x="2" y="2" width="28" height="28" rx="4" opacity="0.4"/><path d="M8 16l6 6 14-14"/>
    </g>
    <text x="44" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#166534">Approve</text>
  </g>

  <!-- step 4 email -->
  <g transform="translate(664, 42)">
    <rect width="88" height="88" rx="18" fill="#eff6ff" stroke="#bfdbfe"/>
    <g transform="translate(26, 26)" stroke="#1d4ed8" stroke-width="1.8" fill="none" stroke-linecap="round">
      <path d="M4 6h24v14H4z"/><path d="M4 9l12 8 12-8"/>
    </g>
    <text x="44" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#1e40af">Gmail</text>
  </g>

  <!-- step 5 track -->
  <g transform="translate(872, 42)">
    <rect width="88" height="88" rx="18" fill="#f5f3ff" stroke="#ddd6fe"/>
    <g transform="translate(26, 26)" stroke="#6d28d9" stroke-width="1.8" fill="none" stroke-linecap="round">
      <path d="M4 20V12M10 20V8M16 20V14M22 20V4"/><path d="M2 22h24" opacity="0.35"/>
    </g>
    <text x="44" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#5b21b6">Track</text>
  </g>

  <line x1="136" y1="86" x2="240" y2="86" stroke="#cbd5e1" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="344" y1="86" x2="448" y2="86" stroke="#cbd5e1" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="552" y1="86" x2="656" y2="86" stroke="#cbd5e1" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="760" y1="86" x2="864" y2="86" stroke="#cbd5e1" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
